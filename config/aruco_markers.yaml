# Team ArUco marker layout
# Unit: meters
#
# This layout is converted from the team leader's mm coordinates:
# ID 1 top-left: [0.00, 0.00]
# ID 2 top-left: [2.75, 0.00]
# ID 0 top-left: [0.00, 0.71]
# ID 3 top-left: [2.75, 0.71]
#
# Marker size = 0.20 m
# Therefore marker center = top-left + [0.10, 0.10]
#
# Coordinate frame:
# This is currently the ArUco layout frame, not necessarily the vehicle frame.

aruco_dictionary: DICT_4X4_50
marker_size_m: 0.20

markers:
  1:
    center: [0.10, 0.10]
    yaw_deg: 0.0

  2:
    center: [2.85, 0.10]
    yaw_deg: 0.0

  0:
    center: [0.10, 0.81]
    yaw_deg: 0.0

  3:
    center: [2.85, 0.81]
    yaw_deg: 0.0